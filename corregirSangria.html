    <style>
        /* Estilos para el estado inicial (Pantalla de Inicio) */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: sans-serif;
            background-color: white;
        }

        #pantalla-inicio {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            background-color: white;
        }

        #btn-iniciar {
            padding: 15px 40px;
            font-size: 24px;
            cursor: pointer;
            border: 2px solid #000;
            background: white;
            transition: 0.3s;
        }

        #btn-iniciar:hover {
            background: #000;
            color: white;
        }

        /* Ocultamos el contenido real al principio */
        #contenido-real {
            display: none;
            padding: 20px;
        }

        /* Clases auxiliares para las fotos */
        .borde-suave {
            border-radius: 15px;
            margin: 10px;
        }
    </style>
</head>

    <script>
        const boton = document.getElementById('btn-iniciar');
        const pantallaInicio = document.getElementById('pantalla-inicio');
        const contenido = document.getElementById('contenido-real');
        const audio = document.getElementById('musica');

        boton.addEventListener('click', () => {
            // 1. Ocultar la pantalla de inicio
            pantallaInicio.style.display = 'none';
            
            // 2. Mostrar el contenido real
            contenido.style.display = 'block';
            
            // 3. Reproducir el audio
            audio.play().catch(error => {
                console.log("El navegador bloqueó el audio, pero ya hubo interacción:", error);
            });
        });
